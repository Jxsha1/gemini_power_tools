name: Compile Extension Workspace

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Dependencies
      run: npm install

    - name: Build Astro Extension
      run: npm run build

    - name: Commit and Push Compiled Production Files
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Add only the distribution folder to keep modifications clean
        git add dist/ -f
        
        # Only commit and push if the fresh compilation actually changed files
        if ! git diff --cached --quiet; then
          git commit -m "build: automated extension compilation overwrite [skip ci]"
          git push origin main
        else
          echo "No changes detected in compiled output files."
        fi
